<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>摸宝仓库 - 设置</title>
  <link rel="stylesheet" href="./styles/ui/settings.css" />
</head>

<body>
  <main class="settings-shell">
    <header class="settings-head">
      <h1>游戏设置</h1>
      <p>可调整回合节奏、出价步长与结算揭示节奏。音乐/音效先保留为占位参数。</p>
    </header>

    <section class="settings-grid" id="settingsForm">
      <label>回合数：
        <input type="number" id="maxRounds" min="3" max="12" />
      </label>
      <label>每回合行动数：
        <input type="number" id="actionsPerRound" min="1" max="4" />
      </label>
      <label>回合时长（秒）：
        <input type="number" id="roundSeconds" min="10" max="60" />
      </label>
      <label>提前拿下阈值（0-1）：
        <input type="number" id="directTakeRatio" min="0.05" max="0.6" step="0.01" />
      </label>
      <label>逐个揭价间隔（毫秒）：
        <input type="number" id="bidRevealIntervalMs" min="250" max="1800" step="10" />
      </label>
      <label>回合后停顿（毫秒）：
        <input type="number" id="postRevealWaitMs" min="800" max="6000" step="50" />
      </label>
      <label>出价步长：
        <input type="number" id="bidStep" min="10" max="10000" step="10" />
      </label>
      <label>默认加价额：
        <input type="number" id="bidDefaultRaise" min="0" max="50000" step="100" />
      </label>
      <label>揭示速度倍率：
        <input type="number" id="revealSpeedMultiplier" min="0.5" max="2.2" step="0.05" />
      </label>
      <label>搜索速度倍率：
        <input type="number" id="searchSpeedMultiplier" min="0.5" max="2.5" step="0.05" />
      </label>
      <label>音乐音量（占位）：
        <input type="number" id="musicVolume" min="0" max="100" />
      </label>
      <label>音效音量（占位）：
        <input type="number" id="sfxVolume" min="0" max="100" />
      </label>
    </section>

    <footer class="settings-actions">
      <button id="resetBtn" type="button">恢复默认</button>
      <button id="saveBtn" type="button">保存并返回</button>
      <button id="backBtn" type="button">不保存返回</button>
    </footer>

    <p class="settings-note" id="statusText">设置会保存在本地浏览器存储中。</p>
  </main>

  <script src="./scripts/ui/settings.js"></script>
</body>

</html>
