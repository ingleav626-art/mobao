<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>摸宝仓库 · 联机对战测试</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(160deg, #2a1f14, #3d2e1e, #4a3728);
      color: #f4dec0;
      min-height: 100vh;
      padding: 16px;
    }

    h1 {
      font-size: 20px;
      text-align: center;
      margin-bottom: 4px;
    }

    .subtitle {
      text-align: center;
      font-size: 12px;
      color: #a08060;
      margin-bottom: 12px;
    }

    .panel {
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid #5a4a3a;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .panel-title {
      font-size: 14px;
      font-weight: 700;
      color: #d4a843;
      margin-bottom: 10px;
    }

    .field {
      margin-bottom: 8px;
    }

    .field label {
      display: block;
      font-size: 12px;
      color: #a08060;
      margin-bottom: 3px;
    }

    .field input,
    .field select {
      width: 100%;
      padding: 8px 10px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid #5a4a3a;
      border-radius: 6px;
      color: #f4dec0;
      font-size: 14px;
      outline: none;
    }

    .field input:focus {
      border-color: #d4a843;
    }

    .btn {
      display: inline-block;
      padding: 8px 16px;
      background: rgba(212, 168, 67, 0.15);
      border: 1px solid #d4a843;
      border-radius: 6px;
      color: #d4a843;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      font-weight: 600;
    }

    .btn:hover {
      background: rgba(212, 168, 67, 0.3);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-primary {
      background: rgba(212, 168, 67, 0.3);
    }

    .btn-danger {
      border-color: #c0392b;
      color: #e74c3c;
      background: rgba(231, 76, 60, 0.1);
    }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .status-bar {
      text-align: center;
      padding: 8px;
      font-size: 13px;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    .status-waiting {
      background: rgba(52, 152, 219, 0.15);
      border: 1px solid #3498db;
      color: #5dade2;
    }

    .status-bidding {
      background: rgba(46, 204, 113, 0.15);
      border: 1px solid #2ecc71;
      color: #2ecc71;
    }

    .status-ok {
      background: rgba(212, 168, 67, 0.15);
      border: 1px solid #d4a843;
      color: #d4a843;
    }

    .status-error {
      background: rgba(231, 76, 60, 0.15);
      border: 1px solid #e74c3c;
      color: #e74c3c;
    }

    .player-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 8px;
      margin-top: 8px;
    }

    .player-card {
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid #5a4a3a;
      border-radius: 8px;
      padding: 8px;
      text-align: center;
      font-size: 12px;
    }

    .player-card.host {
      border-color: #d4a843;
    }

    .player-card .name {
      font-weight: 700;
      font-size: 13px;
      margin-bottom: 4px;
    }

    .player-card .bid {
      color: #2ecc71;
      font-size: 16px;
      font-weight: 700;
    }

    .player-card .bid.pending {
      color: #a08060;
      font-size: 12px;
    }

    .player-card .wallet {
      color: #f39c12;
      font-size: 11px;
      margin-top: 2px;
    }

    .log-area {
      background: rgba(0, 0, 0, 0.35);
      border: 1px solid #5a4a3a;
      border-radius: 8px;
      padding: 8px;
      max-height: 200px;
      overflow-y: auto;
      font-size: 11px;
      font-family: monospace;
      line-height: 1.6;
    }

    .log-area .info {
      color: #5dade2;
    }

    .log-area .ok {
      color: #2ecc71;
    }

    .log-area .warn {
      color: #f39c12;
    }

    .log-area .error {
      color: #e74c3c;
    }

    .hidden {
      display: none !important;
    }

    .bid-input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .bid-input-row input {
      flex: 1;
    }

    .bid-quick {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .bid-quick .btn {
      padding: 6px 10px;
      font-size: 12px;
    }

    .settle-result {
      text-align: center;
      padding: 20px;
    }

    .settle-result .winner {
      font-size: 24px;
      color: #f1c40f;
      font-weight: 700;
    }

    .settle-result .detail {
      font-size: 14px;
      color: #a08060;
      margin-top: 8px;
    }

    .wallet-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 6px;
      margin-bottom: 8px;
    }

    .wallet-bar .amount {
      color: #f1c40f;
      font-size: 18px;
      font-weight: 700;
    }

    .host-badge {
      display: inline-block;
      padding: 2px 6px;
      background: rgba(212, 168, 67, 0.2);
      border: 1px solid #d4a843;
      border-radius: 4px;
      color: #d4a843;
      font-size: 10px;
      font-weight: 700;
    }

    .round-info {
      text-align: center;
      font-size: 14px;
      color: #d4a843;
      margin-bottom: 8px;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <h1>🏚️ 摸宝仓库 · 联机对战测试</h1>
  <p class="subtitle">Host-Authority Architecture v0.4</p>

  <div id="statusBar" class="status-bar status-waiting">未连接</div>

  <div class="wallet-bar hidden" id="walletBar">
    <span>💰 我的资金</span>
    <span class="amount" id="walletAmount">3,000,000</span>
  </div>

  <div class="round-info hidden" id="roundInfo"></div>

  <div id="connectPanel" class="panel">
    <div class="panel-title">📡 服务器连接</div>
    <div class="field">
      <label>服务器地址</label>
      <input type="text" id="serverUrl" value="" placeholder="ws://IP:9720" />
    </div>
    <div class="field">
      <label>你的名字</label>
      <input type="text" id="playerName" value="" placeholder="输入名字" maxlength="12" />
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" id="connectBtn">连接</button>
    </div>
    <div class="btn-row hidden" id="roomActionBtns">
      <button class="btn btn-primary" id="createRoomBtn">🏠 创建房间</button>
      <button class="btn" id="joinRoomBtn">🚪 加入房间</button>
    </div>
    <div class="field hidden" id="joinField">
      <label>房间号</label>
      <input type="text" id="joinCode" placeholder="ABCD" maxlength="4" />
      <button class="btn btn-primary" id="joinConfirmBtn" style="margin-top:6px">加入</button>
    </div>
  </div>

  <div id="roomPanel" class="panel hidden">
    <div class="panel-title">🏠 房间 <span id="roomCodeDisplay"></span></div>
    <div class="player-grid" id="playerGrid"></div>
    <div class="btn-row" id="hostBtns">
      <button class="btn btn-primary" id="startGameBtn">开始游戏</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-danger" id="leaveRoomBtn">离开</button>
    </div>
  </div>

  <div id="gamePanel" class="panel hidden">
    <div class="panel-title">🎮 游戏进行中</div>
    <div class="player-grid" id="gamePlayerGrid"></div>

    <div id="bidPanel" class="hidden">
      <div class="bid-input-row">
        <input type="number" id="bidInput" placeholder="输入出价" min="0" step="10000">
        <button class="btn btn-primary" id="submitBidBtn">出价</button>
      </div>
      <div class="bid-quick">
        <button class="btn" data-bid="0">弃权</button>
        <button class="btn" data-bid="step">+1步</button>
        <button class="btn" data-bid="step2">+2步</button>
        <button class="btn" data-bid="step5">+5步</button>
        <button class="btn" data-bid="half">半仓</button>
        <button class="btn" data-bid="all">全仓</button>
      </div>
    </div>

    <div id="bidWaitPanel" class="hidden" style="text-align:center;padding:12px;color:#a08060;">
      ⏳ 等待其他玩家出价...
    </div>
  </div>

  <div id="settlePanel" class="panel hidden">
    <div class="settle-result">
      <div class="winner" id="settleWinner"></div>
      <div class="detail" id="settleDetail"></div>
    </div>
    <div class="player-grid" id="settlePlayerGrid"></div>
  </div>

  <div class="panel">
    <div class="panel-title">📋 日志</div>
    <div class="log-area" id="logArea"></div>
  </div>

  <script src="lan-bridge.js"></script>
  <script>
    (function () {
      var bridge = new LanBridge();

      var START_MONEY = 3000000;
      var MAX_ROUNDS = 10;
      var ROUND_SECONDS = 30;
      var DIRECT_TAKE_RATIO = 0.3;

      var myWallet = START_MONEY;
      var currentRound = 0;
      var currentBid = 0;
      var bidSubmitted = false;
      var isHost = false;
      var players = [];
      var hostBids = {};
      var hostWallets = {};
      var hostAiPlayers = [];

      function $(id) { return document.getElementById(id); }
      function log(msg, cls) {
        var area = $("logArea");
        var div = document.createElement("div");
        div.className = cls || "info";
        div.textContent = "[" + new Date().toLocaleTimeString() + "] " + msg;
        area.appendChild(div);
        area.scrollTop = area.scrollHeight;
      }
      function setStatus(text, cls) {
        var bar = $("statusBar");
        bar.textContent = text;
        bar.className = "status-bar status-" + (cls || "waiting");
      }
      function fmt(n) { return Number(n || 0).toLocaleString(); }

      function autoDetectUrl() {
        var h = location.host;
        if (h) return "ws://" + h;
        return "ws://localhost:9720";
      }
      $("serverUrl").value = autoDetectUrl();

      function updateWalletDisplay() {
        $("walletBar").classList.remove("hidden");
        $("walletAmount").textContent = fmt(myWallet);
      }

      function renderPlayerGrid(containerId, playerList, showBid, showWallet) {
        var container = $(containerId);
        container.innerHTML = "";
        playerList.forEach(function (p) {
          var card = document.createElement("div");
          card.className = "player-card" + (p.isHost ? " host" : "");
          var bidHtml = "";
          if (showBid && p.bid !== undefined) {
            bidHtml = '<div class="bid">' + fmt(p.bid) + '</div>';
          } else if (showBid && p.bidPending) {
            bidHtml = '<div class="bid pending">等待出价...</div>';
          }
          var walletHtml = "";
          if (showWallet && p.wallet !== undefined) {
            walletHtml = '<div class="wallet">💰 ' + fmt(p.wallet) + '</div>';
          }
          var badge = p.isHost ? ' <span class="host-badge">主机</span>' : "";
          var aiBadge = p.isAI ? ' <span class="host-badge" style="border-color:#3498db;color:#5dade2">AI</span>' : "";
          card.innerHTML = '<div class="name">' + p.name + badge + aiBadge + '</div>' + bidHtml + walletHtml;
          container.appendChild(card);
        });
      }

      function simulateAiBids() {
        var bids = {};
        hostAiPlayers.forEach(function (ai) {
          var wallet = hostWallets[ai.id] || START_MONEY;
          var maxBid = Math.floor(wallet * 0.6);
          var r = Math.random();
          var bid;
          if (r < 0.15) {
            bid = 0;
          } else if (r < 0.5) {
            bid = Math.min(Math.floor(currentBid * (1 + DIRECT_TAKE_RATIO * 0.5) + Math.random() * 50000), maxBid);
          } else {
            bid = Math.min(Math.floor(Math.random() * maxBid * 0.4 + currentBid * 0.3), maxBid);
          }
          bids[ai.id] = Math.max(0, Math.round(bid));
        });
        return bids;
      }

      function hostResolveRound(reason) {
        var allBids = [];
        players.forEach(function (p) {
          var bid = hostBids[p.id] || 0;
          var wallet = hostWallets[p.id] || START_MONEY;
          var clamped = Math.min(Math.max(0, bid), wallet);
          allBids.push({
            playerId: p.id,
            playerName: p.name,
            isAI: !!p.isAI,
            isHost: !!p.isHost,
            bid: clamped,
          });
        });

        bridge.broadcastRoundResult(currentRound, allBids, reason);
        log("主机广播回合结果: " + allBids.map(function (b) { return b.playerName + "=" + fmt(b.bid); }).join(", "), "ok");

        var sorted = allBids.slice().sort(function (a, b) { return b.bid - a.bid; });
        var first = sorted[0];
        var second = sorted[1] || { bid: 0 };

        currentBid = first.bid;

        var shouldDirectTake = currentRound < MAX_ROUNDS &&
          first.bid > 0 &&
          first.bid >= Math.ceil(second.bid * (1 + DIRECT_TAKE_RATIO));

        var shouldSettle = currentRound >= MAX_ROUNDS || shouldDirectTake;

        if (shouldSettle) {
          var mode = currentRound >= MAX_ROUNDS ? "final" : "direct";
          setTimeout(function () { hostSettleGame(first, mode); }, 1500);
        } else {
          setTimeout(function () {
            currentRound += 1;
            hostStartRound();
          }, 2000);
        }
      }

      function hostSettleGame(winner, mode) {
        var totalValue = Math.floor(START_MONEY * 0.8 + Math.random() * START_MONEY * 0.6);
        var winnerProfit = totalValue - winner.bid;

        var settleData = {
          winnerId: winner.playerId,
          winnerName: winner.playerName,
          winnerBid: winner.bid,
          totalValue: totalValue,
          winnerProfit: winnerProfit,
          secondHighestBid: 0,
          mode: mode,
        };

        var sorted = (players.slice().sort(function (a, b) {
          return (hostBids[b.id] || 0) - (hostBids[a.id] || 0);
        }));
        if (sorted.length > 1) settleData.secondHighestBid = hostBids[sorted[1].id] || 0;

        bridge.broadcastSettle(settleData);
        log("主机广播结算: winner=" + winner.playerName + " bid=" + fmt(winner.bid) + " value=" + fmt(totalValue), "ok");

        var finalWallets = {};
        var profitDetails = [];
        players.forEach(function (p) {
          var bid = hostBids[p.id] || 0;
          if (p.id === winner.playerId) {
            finalWallets[p.id] = hostWallets[p.id] - bid + totalValue;
            profitDetails.push({ playerId: p.id, playerName: p.name, bid: bid, value: totalValue, profit: winnerProfit });
          } else {
            finalWallets[p.id] = hostWallets[p.id] - bid;
            profitDetails.push({ playerId: p.id, playerName: p.name, bid: bid, value: 0, profit: -bid });
          }
        });

        setTimeout(function () {
          bridge.broadcastSettleFinal(finalWallets, profitDetails);
          log("主机广播最终钱包", "ok");
        }, 1500);
      }

      function hostStartRound() {
        hostBids = {};
        bridge.broadcastRoundStart(currentRound, MAX_ROUNDS, currentBid, ROUND_SECONDS);
        log("主机广播第 " + currentRound + " 回合开始", "ok");
        handleRoundStart({ round: currentRound, maxRounds: MAX_ROUNDS, currentBid: currentBid, roundSeconds: ROUND_SECONDS });
      }

      function handleRoundStart(msg) {
        currentRound = msg.round;
        currentBid = msg.currentBid || 0;
        bidSubmitted = false;
        $("roundInfo").textContent = "第 " + msg.round + " / " + msg.maxRounds + " 回合 | 当前价: " + fmt(currentBid) + " | " + msg.roundSeconds + "秒";
        $("roundInfo").classList.remove("hidden");
        $("bidPanel").classList.remove("hidden");
        $("bidWaitPanel").classList.add("hidden");
        $("bidInput").value = "";
        $("submitBidBtn").disabled = false;
        setStatus("出价中 - 第" + msg.round + "回合", "bidding");

        var displayList = players.map(function (p) {
          return { name: p.name, isHost: p.isHost, isAI: p.isAI, bidPending: true };
        });
        renderPlayerGrid("gamePlayerGrid", displayList, true, false);
      }

      function handleBidReveal(msg) {
        $("bidPanel").classList.add("hidden");
        $("bidWaitPanel").classList.add("hidden");
        setStatus("揭示中", "ok");

        var displayList = msg.bids.map(function (b) {
          return {
            name: b.playerName,
            isHost: b.isHost,
            isAI: b.isAI,
            bid: b.bid,
          };
        });
        renderPlayerGrid("gamePlayerGrid", displayList, true, false);
        log("回合 " + msg.round + " 结果: " + msg.bids.map(function (b) { return b.playerName + "=" + fmt(b.bid); }).join(", "), "ok");
      }

      function handleSettle(msg) {
        $("gamePanel").classList.add("hidden");
        $("settlePanel").classList.remove("hidden");
        $("roundInfo").classList.add("hidden");
        setStatus("已结算", "ok");

        $("settleWinner").textContent = "🏆 " + msg.winnerName + " 获胜!";
        var modeText = msg.mode === "direct" ? "直接拿下" : "最终回合";
        $("settleDetail").textContent = "出价 " + fmt(msg.winnerBid) + " | 价值 " + fmt(msg.totalValue) + " | 利润 " + fmt(msg.winnerProfit) + " | " + modeText;
        log("结算: " + msg.winnerName + " 出价=" + fmt(msg.winnerBid) + " 价值=" + fmt(msg.totalValue) + " 利润=" + fmt(msg.winnerProfit), "ok");
      }

      function handleSettleFinal(msg) {
        var displayList = [];
        for (var i = 0; i < players.length; i++) {
          var p = players[i];
          var w = msg.wallets[p.id];
          if (w !== undefined) {
            displayList.push({ name: p.name, isHost: p.isHost, isAI: p.isAI, wallet: w });
          }
        }
        for (var j = 0; j < msg.profitDetails.length; j++) {
          var d = msg.profitDetails[j];
          log("  " + d.playerName + ": 出价=" + fmt(d.bid) + " 价值=" + fmt(d.value) + " 利润=" + fmt(d.profit), "info");
        }
        renderPlayerGrid("settlePlayerGrid", displayList, false, true);

        var myFinal = msg.wallets[bridge.playerId];
        if (myFinal !== undefined) {
          myWallet = myFinal;
          updateWalletDisplay();
        }
      }

      bridge.on("ws:open", function () {
        setStatus("已连接 - 创建或加入房间", "ok");
        $("connectBtn").disabled = true;
        $("roomActionBtns").classList.remove("hidden");
        log("WebSocket 连接成功", "ok");
      });

      bridge.on("ws:close", function (d) {
        setStatus("连接断开 (code=" + d.code + ")", "error");
        $("connectBtn").disabled = false;
        log("连接断开: code=" + d.code, "error");
      });

      bridge.on("ws:error", function () {
        setStatus("连接错误", "error");
        log("连接错误", "error");
      });

      bridge.on("room:created", function (msg) {
        $("connectPanel").classList.add("hidden");
        $("roomPanel").classList.remove("hidden");
        $("roomCodeDisplay").textContent = msg.roomCode;
        isHost = true;
        players = [{ id: msg.playerId, name: msg.playerName, isHost: true }];
        renderPlayerGrid("playerGrid", players, false, false);
        log("房间已创建: " + msg.roomCode + " (你是主机)", "ok");
        setStatus("房间 " + msg.roomCode + " 等待玩家加入", "ok");
      });

      bridge.on("room:joined", function (msg) {
        $("connectPanel").classList.add("hidden");
        $("roomPanel").classList.remove("hidden");
        $("roomCodeDisplay").textContent = msg.roomCode;
        isHost = false;
        players = msg.players || [];
        $("hostBtns").classList.add("hidden");
        renderPlayerGrid("playerGrid", players, false, false);
        log("已加入房间: " + msg.roomCode, "ok");
        setStatus("房间 " + msg.roomCode + " 等待主机开始", "ok");
      });

      bridge.on("room:join-failed", function (msg) {
        log("加入失败: " + msg.reason, "error");
      });

      bridge.on("room:player-joined", function (msg) {
        players = msg.players || players;
        renderPlayerGrid("playerGrid", players, false, false);
        log(msg.playerName + " 加入了房间", "info");
      });

      bridge.on("room:player-left", function (msg) {
        log(msg.playerName + " 离开了房间", "warn");
      });

      bridge.on("game:init", function (msg) {
        isHost = bridge.isHost;
        players = msg.players || [];
        myWallet = START_MONEY;
        updateWalletDisplay();

        $("roomPanel").classList.add("hidden");
        $("gamePanel").classList.remove("hidden");
        $("settlePanel").classList.add("hidden");

        if (isHost) {
          hostWallets = {};
          players.forEach(function (p) { hostWallets[p.id] = START_MONEY; });

          hostAiPlayers = [];
          var humanCount = players.length;
          var aiCount = Math.max(0, 4 - humanCount);
          for (var i = 0; i < aiCount; i++) {
            var aiId = "ai_" + i + "_" + Date.now();
            var aiName = "AI-" + (i + 1);
            var aiPlayer = { id: aiId, name: aiName, isAI: true, isHost: false };
            hostAiPlayers.push(aiPlayer);
            players.push(aiPlayer);
            hostWallets[aiId] = START_MONEY;
          }
          log("主机添加 " + aiCount + " 个AI (复用 AuctionAiEngine 的位置)", "ok");
        }

        log("游戏开始! isHost=" + isHost + " players=" + players.length, "ok");
        setStatus("游戏开始!", "ok");

        if (isHost) {
          currentRound = 1;
          currentBid = 0;
          hostStartRound();
        }
      });

      bridge.on("round:start", function (msg) {
        if (!isHost) {
          handleRoundStart(msg);
        }
      });

      bridge.on("round:bid-ack", function (msg) {
        bidSubmitted = true;
        $("submitBidBtn").disabled = true;
        $("bidPanel").classList.add("hidden");
        $("bidWaitPanel").classList.remove("hidden");
        log("出价已确认: " + fmt(msg.bid), "ok");
      });

      bridge.on("bid:received", function (msg) {
        log(msg.playerName + " 已出价", "info");

        if (isHost) {
          hostBids[msg.playerId] = msg.bid;
          var displayList = players.map(function (p) {
            var hasBid = hostBids[p.id] !== undefined;
            return { name: p.name, isHost: p.isHost, isAI: p.isAI, bid: hasBid ? hostBids[p.id] : undefined, bidPending: !hasBid };
          });
          renderPlayerGrid("gamePlayerGrid", displayList, true, false);
        }
      });

      bridge.on("all-bids-in", function (msg) {
        if (!isHost) return;
        log("所有人类玩家已出价，主机计算AI并揭示...", "ok");

        var aiBids = simulateAiBids();
        for (var aid in aiBids) { hostBids[aid] = aiBids[aid]; }

        if (hostBids[bridge.playerId] === undefined) {
          hostBids[bridge.playerId] = 0;
        }

        hostResolveRound("all-in");
      });

      bridge.on("round:timeout", function (msg) {
        log("回合超时!", "warn");
        if (isHost) {
          if (hostBids[bridge.playerId] === undefined) {
            hostBids[bridge.playerId] = 0;
          }
          var aiBids = simulateAiBids();
          for (var aid in aiBids) { hostBids[aid] = aiBids[aid]; }
          hostResolveRound("timeout");
        }
      });

      bridge.on("round:result", function (msg) {
        if (!isHost) {
          handleBidReveal(msg);
        } else {
          handleBidReveal(msg);
        }
      });

      bridge.on("game:settle", function (msg) {
        handleSettle(msg);
      });

      bridge.on("game:settle-final", function (msg) {
        handleSettleFinal(msg);
      });

      bridge.on("game:next-round", function (msg) {
        if (!isHost) {
          currentRound = msg.round;
          currentBid = msg.currentBid;
        }
      });

      bridge.on("chat", function (msg) {
        log("[聊天] " + msg.fromName + ": " + msg.text, "info");
      });

      bridge.on("error", function (msg) {
        log("错误: " + msg.reason, "error");
      });

      $("connectBtn").addEventListener("click", function () {
        var url = $("serverUrl").value.trim();
        var name = $("playerName").value.trim() || "Player";
        if (!url) { log("请输入服务器地址", "error"); return; }
        setStatus("连接中...", "waiting");
        bridge.connect(url, name).catch(function (e) {
          setStatus("连接失败", "error");
          log("连接失败: " + e.message, "error");
        });
      });

      $("startGameBtn").addEventListener("click", function () {
        bridge.startGame();
      });

      $("createRoomBtn").addEventListener("click", function () {
        bridge.createRoom();
      });

      $("joinRoomBtn").addEventListener("click", function () {
        $("joinField").classList.toggle("hidden");
      });

      $("joinConfirmBtn").addEventListener("click", function () {
        var code = $("joinCode").value.trim().toUpperCase();
        if (!code) { log("请输入房间号", "error"); return; }
        bridge.joinRoom(code);
      });

      $("leaveRoomBtn").addEventListener("click", function () {
        bridge.leaveRoom();
        $("roomPanel").classList.add("hidden");
        $("gamePanel").classList.add("hidden");
        $("settlePanel").classList.add("hidden");
        $("connectPanel").classList.remove("hidden");
        setStatus("已离开房间", "waiting");
      });

      $("submitBidBtn").addEventListener("click", function () {
        var val = parseInt($("bidInput").value, 10);
        if (isNaN(val) || val < 0) { log("请输入有效出价", "error"); return; }
        if (val > myWallet) { log("出价不能超过资金 " + fmt(myWallet), "error"); return; }
        bridge.submitBid(val);
      });

      $("bidInput").addEventListener("keydown", function (e) {
        if (e.key === "Enter") $("submitBidBtn").click();
      });

      var quickBtns = document.querySelectorAll(".bid-quick .btn");
      for (var i = 0; i < quickBtns.length; i++) {
        quickBtns[i].addEventListener("click", function () {
          var action = this.getAttribute("data-bid");
          var val = 0;
          if (action === "0") { val = 0; }
          else if (action === "step") { val = currentBid + 100000; }
          else if (action === "step2") { val = currentBid + 200000; }
          else if (action === "step5") { val = currentBid + 500000; }
          else if (action === "half") { val = Math.floor(myWallet / 2); }
          else if (action === "all") { val = myWallet; }
          $("bidInput").value = Math.min(val, myWallet);
        });
      }
    })();
  </script>
</body>

</html>
